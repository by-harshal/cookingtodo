<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cooking To-Do</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>What's on your plate today?</h1>
            <p>Tell us your schedule, budget, and diet. We'll handle the rest.</p>
        </header>

        <main>
            <form id="setup-form" class="setup-form">

                <div class="form-group">
                    <label for="day-context">How is your day looking?</label>
                    <textarea id="day-context" placeholder="e.g., Busy until 6 PM, need something quick for dinner, going to the gym at 7 AM..." required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="budget">Daily Budget (₹)</label>
                        <input type="number" id="budget" placeholder="e.g., 500" required min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>Dietary Preferences</label>
                        <div class="diet-pills" id="diet-pills">
                            <button type="button" class="diet-pill active" data-value="Veg">Veg</button>
                            <button type="button" class="diet-pill" data-value="Vegan">Vegan</button>
                            <button type="button" class="diet-pill" data-value="Eggetarian">Eggetarian</button>
                            <button type="button" class="diet-pill" data-value="Non-veg">Non-veg</button>
                        </div>
                        <input type="hidden" id="diet" value="Veg" required>
                    </div>
                </div>

                <button type="submit" id="generate-btn" class="primary-btn">Generate Meal Plan</button>
            </form>

            <!-- Results Section (Populated in Slice 3) -->
            <div id="results-container" class="results-container hidden">
                <div class="results-header">
                    <h2>Your Meal Plan</h2>
                    <button type="button" id="reset-btn" class="secondary-btn">Start Over</button>
                </div>
                
                <div class="budget-status" id="budget-status">
                    <!-- populated by js -->
                </div>

                <div class="meals-grid">
                    <div class="meal-card">
                        <h3>Breakfast</h3>
                        <p id="meal-breakfast">Loading...</p>
                    </div>
                    <div class="meal-card">
                        <h3>Lunch</h3>
                        <p id="meal-lunch">Loading...</p>
                    </div>
                    <div class="meal-card">
                        <h3>Dinner</h3>
                        <p id="meal-dinner">Loading...</p>
                    </div>
                </div>

                <div class="lists-container">
                    <div class="grocery-list-card">
                        <h3>Grocery List</h3>
                        <ul id="grocery-list" class="styled-list">
                            <!-- populated by js -->
                        </ul>
                    </div>
                    <div class="substitutions-card">
                        <h3>Smart Substitutions</h3>
                        <ul id="substitutions-list" class="styled-list">
                            <!-- populated by js -->
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
